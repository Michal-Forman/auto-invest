<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BTC Withdrawal</title>
</head>
<body style="margin:0;padding:0;background-color:#fffbeb;font-family:Arial,Helvetica,sans-serif;">
  <table width="100%" cellpadding="0" cellspacing="0" style="background-color:#fffbeb;padding:32px 0;">
    <tr>
      <td align="center">
        <table width="600" cellpadding="0" cellspacing="0" style="max-width:600px;width:100%;background-color:#ffffff;border-radius:8px;overflow:hidden;box-shadow:0 2px 12px rgba(146,64,14,0.10);">

          <!-- Header -->
          <tr>
            <td style="background-color:#d97706;padding:0;">
              <table width="100%" cellpadding="0" cellspacing="0">
                <tr>
                  <td style="padding:28px 16px 28px 40px;vertical-align:middle;">
                    <p style="margin:0;font-size:11px;letter-spacing:2px;color:#fef3c7;text-transform:uppercase;font-weight:600;">auto-invest</p>
                    <h1 style="margin:6px 0 0;font-size:24px;color:#ffffff;font-weight:700;">BTC Withdrawal</h1>
                    <p style="margin:4px 0 0;font-size:15px;color:#fef3c7;font-weight:400;">${date_label}</p>
                  </td>
                  <td width="73" align="center" style="padding:20px 40px 20px 12px;vertical-align:middle;">
                    <img src="cid:logo" alt="auto-invest" width="68" height="68" style="display:block;margin:0 auto;" />
                  </td>
                </tr>
              </table>
            </td>
          </tr>

          <!-- Summary cards -->
          <tr>
            <td style="padding:28px 40px 0;">
              <table width="100%" cellpadding="0" cellspacing="0">
                <tr>
                  <td width="33%" style="padding-right:8px;">
                    <div style="background-color:#fffbeb;border:1px solid #fde68a;border-radius:6px;padding:14px 16px;">
                      <p style="margin:0;font-size:11px;color:#6b7280;text-transform:uppercase;letter-spacing:1px;font-weight:600;">Amount</p>
                      <p style="margin:6px 0 0;font-size:12px;color:#92400e;font-weight:700;">${amount_btc} BTC</p>
                    </div>
                  </td>
                  <td width="33%" style="padding-right:8px;">
                    <div style="background-color:#fffbeb;border:1px solid #fde68a;border-radius:6px;padding:14px 16px;">
                      <p style="margin:0;font-size:11px;color:#6b7280;text-transform:uppercase;letter-spacing:1px;font-weight:600;">Fee</p>
                      <p style="margin:6px 0 0;font-size:12px;color:#92400e;font-weight:700;">${fee_btc} BTC</p>
                    </div>
                  </td>
                  <td width="33%">
                    <div style="background-color:#92400e;border-radius:6px;padding:14px 16px;">
                      <p style="margin:0;font-size:11px;color:#fde68a;text-transform:uppercase;letter-spacing:1px;font-weight:600;">CZK Value</p>
                      <p style="margin:6px 0 0;font-size:18px;color:#ffffff;font-weight:700;">${amount_czk} CZK</p>
                    </div>
                  </td>
                </tr>
              </table>
            </td>
          </tr>

          <!-- Details section -->
          <tr>
            <td style="padding:28px 40px 8px;">
              <h2 style="margin:0 0 14px;font-size:14px;color:#92400e;text-transform:uppercase;letter-spacing:1px;font-weight:700;">Details</h2>
              <table width="100%" cellpadding="0" cellspacing="0" style="border-collapse:collapse;">
                <tr style="background-color:#fffbeb;">
                  <td style="padding:10px 14px;font-size:12px;color:#6b7280;font-weight:600;width:40%;">Exchange ID</td>
                  <td style="padding:10px 14px;font-size:13px;color:#1e293b;font-weight:700;">${exchange_id}</td>
                </tr>
                <tr style="background-color:#ffffff;">
                  <td style="padding:10px 14px;font-size:12px;color:#6b7280;font-weight:600;">Timestamp</td>
                  <td style="padding:10px 14px;font-size:13px;color:#1e293b;">${timestamp}</td>
                </tr>
                <tr style="background-color:#fffbeb;">
                  <td style="padding:10px 14px;font-size:12px;color:#6b7280;font-weight:600;">Transfer type</td>
                  <td style="padding:10px 14px;font-size:13px;color:#1e293b;">${transfer_type}</td>
                </tr>
                <tr style="background-color:#ffffff;">
                  <td style="padding:10px 14px;font-size:12px;color:#6b7280;font-weight:600;">Destination</td>
                  <td style="padding:10px 14px;font-size:13px;color:#1e293b;word-break:break-all;" title="${destination_full}">${destination_short}</td>
                </tr>
              </table>
            </td>
          </tr>

          <!-- Footer -->
          <tr>
            <td style="padding:28px 40px 32px;">
              <p style="margin:0;font-size:12px;color:#9ca3af;text-align:center;">
                This is an automated notification from <strong style="color:#92400e;">auto-invest</strong>.
              </p>
            </td>
          </tr>

        </table>
      </td>
    </tr>
  </table>
</body>
</html>
